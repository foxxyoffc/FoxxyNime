<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anime Streaming VIP Dracin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
</head>
<body>
    <div class="app">
        <header>
            <h1>🎬 StreamingKu</h1>
            <div class="user-badge" id="vipBadge">🔓 Anime & Donghua</div>
        </header>
        <div class="tabs">
            <button class="tab-btn active" data-type="anime">Anime</button>
            <button class="tab-btn" data-type="donghua">Donghua</button>
            <button class="tab-btn" data-type="dracin">Dracin <span class="vip-tag">VIP>10</span></button>
        </div>
        <div class="content-list" id="contentList">
            <div class="loading">Loading...</div>
        </div>
        <div id="playerModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3 id="modalTitle"></h3>
                <div class="episode-selector" id="epSelector"></div>
                <div class="video-container">
                    <iframe id="videoFrame" width="100%" height="300" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
